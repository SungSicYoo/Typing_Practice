function genPosText(lang,cat){
  if(lang==="en"){
    let pool;
    if(cat.includes("가운데줄"))pool=EN_KEYS.mid;
    else if(cat.includes("윗줄"))pool=EN_KEYS.top;
    else if(cat.includes("아랫줄"))pool=EN_KEYS.bot;
    else pool=EN_KEYS.all;
    const groups=[];for(let i=0;i<25;i++){const gl=2+Math.floor(Math.random()*3);let g="";for(let j=0;j<gl;j++)g+=pickR(pool);groups.push(g)}
    return groups.join(" ");
  }else{
    let row=null;
    if(cat.includes("가운데줄"))row="mid";
    else if(cat.includes("윗줄"))row="top";
    else if(cat.includes("아랫줄"))row="bot";
    if(!row)return shuffle(KR_WORDS.all).slice(0,20).join(" ");
    const words=shuffle(KR_WORDS[row]);
    const syls=[];for(let i=0;i<15;i++)syls.push(genKrSylGroup(row,1+Math.floor(Math.random()*2)));
    const mixed=[...words,...syls];
    return shuffle(mixed).slice(0,20).join(" ");
  }

const BATTLE_WORDS={en:{normal:["the","and","for","you","are","was","his","her","can","had","one","all","day","get","how","new","now","old","see","two","way","who","did","got","let","run","set","try","ask","put","use","about","after","again","along","angry","apart","avoid","basic","beach","begin","below","board","brain","brand","brave","bread","break","bring","broad","brown","build","cause","chain","chair","cheap","check","chief","child","claim","class","clean","clear","climb","close","cloud","coast","color","count","could","court","cover","crash","crazy","cream","cross","crowd","dance","death","draft","drama","dream","dress","drink","drive","eight","empty","enemy","enjoy","enter","equal","error","essay","event","every","exact","exist","extra","faith","false","fault","field","fight","final","floor","focus","force","found","frame","fresh","front","fruit","grace","grade","grand","grant","grass","great","green","group","guard","guess","guide","happy","heart","heavy","horse","hotel","house","human","ideal","image","index","inner","input","issue","joint","judge","known","labor","large","later","laugh","learn","legal","level","light","limit","local","lower","lucky","lunch","magic","major","match","metal","might","minor","model","month","moral","mouse","mouth","movie","music","nerve","never","night","noise","north","novel","nurse","ocean","offer","often","order","other","owner","paint","paper","party","peace","phone","photo","piece","place","plain","plane","plant","plate","point","pound","power","press","price","pride","prime","print","prize","proof","proud","prove","queen","quick","quiet","quite","radio","raise","range","rapid","reach","ready","right","river","robot","rough","round","route","royal","rural","scale","scene","score","sense","serve","seven","shape","share","sharp","sheet","shift","shine","shirt","shock","shore","short","sight","since","sleep","slide","small","smart","smell","smile","smoke","solid","solve","sorry","south","space","speak","speed","spend","split","sport","staff","stage","stand","start","state","steal","steam","steel","stick","still","stock","stone","store","storm","story","stuck","study","stuff","style","sugar","super","sweet","swing","table","taste","teach","theme","thick","thing","think","third","those","three","throw","title","today","total","touch","tough","tower","track","trade","trail","train","treat","trend","trial","trick","truck","truly","trust","truth","twice","uncle","under","union","unite","until","upper","upset","urban","usual","value","video","virus","visit","voice","waste","watch","water","wheel","where","which","while","white","whole","woman","world","worry","worse","worst","worth","would","write","wrong","young"],special:["absolutely","accomplish","background","basketball","battlefield","capability","capitalize","celebrated","changeable","characters","checkpoint","classified","commission","communicate","completely","comprehend","compromise","confidence","connection","conspiracy","contradict","contribute","controller","coordinate","correspond","crossroads","curriculum","decoration","delightful","department","developing","dictionary","difficulty","dimensions","discipline","discovered","documented","downstream","earthquake","elementary","encourages","engagement","enterprise","enthusiasm","especially","everything","everywhere","excellence","experience","expression","fascinated","flashlight","foundation","friendship","generation","government","guaranteed","guidelines","handwriting","healthcare","highlights","horizontal","identifies","illustrate","impossible","incredibly","indication","individual","inevitable","influenced","innovation","instrument","integrated","interested","introduced","investment","journalism","kilometers","laboratory","leadership","limitation","literature","management","meaningful","microscope","motivation","multiplied","navigation","newsletter","obligation","occupation","opposition","outrageous","parliament","particular","percentage","performing","permission","persistent","p function isSpecWord(w,lang){return lang==="kr"?w.length>=5:w.length>=10}

function BattleGame({lang,onMenu,userId}){
  const[phase,setPhase]=useState("select"); // select, waiting, playing, over
  const[mode,setMode]=useState(null);
  const[diff,setDiff]=useState("medium");
  const[opName,setOpName]=useState("AI");
  const[pBlocks,setPBlocks]=useState(10);
  const[eBlocks,setEBlocks]=useState(10);
  const[pWord,setPWord]=useState("");
  const[eWord,setEWord]=useState("");
  const[pInput,setPInput]=useState("");
  const[projs,setProjs]=useState([]);
  const[explosions,setExplosions]=useState([]);
  const[winner,setWinner]=useState(null);

  // HTTPS Polling Relay (ntfy.sh, standard GET/POST only)
  const[roomCode,setRoomCode]=useState("");
  const[joinCode,setJoinCode]=useState("");
  const[connStatus,setConnStatus]=useState("");
  
  const iR=useRef(null);const fR=useRef(null);const aiTR=useRef(null);
  const pbR=useRef(10);const ebR=useRef(10);const projR=useRef([]);
  const winRef=useRef(null);
  const topicRef=useRef('');const pollRef=useRef(null);
  const myIdRef=useRef('p_'+Math.random().toString(36).substr(2,8));
  const lastIdRef=useRef('');
  const initRecvRef=useRef(false);
  const hostInitSentRef=useRef(false);
  const aliveRef=useRef(false);
  
  projR.current=projs;pbR.current=pBlocks;ebR.current=eBlocks;winRef.current=winner;

  const getWord=useCallback((spec=false)=>{const p=spec?BATTLE_WORDS[lang].special:BATTLE_WORDS[lang].normal;return pickR(p)},[lang]);
  const newWords=useCallback(()=>{setPWord(getWord(Math.random()<0.3));setEWord(getWord(Math.random()<0.3))},[getWord]);
  
  const fireProj=useCallback((fromPlayer,word, forcePw=null)=>{
    const pw=forcePw!==null ? forcePw : (isSpecWord(word,lang)?2:1);
    setProjs(prev=>[...prev,{id:Date.now()+Math.random(),fromPlayer,power:pw,startTime:Date.now(),duration:2500,word}]);
  },[lang]);

  const RELAY='https://ntfy.sh';

  const relaySend=useCallback((data)=>{
    const t=topicRef.current;if(!t)return;
    fetch(RELAY+'/'+t,{method:'POST',body:JSON.stringify({...data,_s:myIdRef.current}),cache:'no-store'}).catch(()=>{});
  },[]);

  const cleanup=useCallback(()=>{
    clearTimeout(aiTR.current);
    aliveRef.current=false;
    if(pollRef.current){clearInterval(pollRef.current);pollRef.current=null}
  },[]);

  // ── AI ──
  const startAI=useCallback(()=>{
    const sp={easy:[3000,5000],medium:[1500,2500],hard:[700,1200]};
    const[mn,mx]=sp[diff];
    const loop=()=>{if(ebR.current<=0||pbR.current<=0)return;
      aiTR.current=setTimeout(()=>{fireProj(false,getWord(Math.random()<0.25));setEWord(getWord(Math.random()<0.3));loop()},mn+Math.random()*(mx-mn))};
    loop();
  },[diff,getWord,fireProj]);

  const startGameAI=useCallback((d)=>{
    setDiff(d);setMode("ai");setOpName({easy:"AI (하)",medium:"AI (중)",hard:"AI (상)"}[d]);
    setPBlocks(10);setEBlocks(10);pbR.current=10;ebR.current=10;
    setProjs([]);setExplosions([]);setWinner(null);winRef.current=null;setPInput("");
    newWords();setPhase("playing");
    setTimeout(()=>startAI(),1000);
  },[newWords,startAI]);

  // ── HTTPS POLLING RELAY ONLINE GAME ──
  const startOnlineGame = useCallback((isHost, w1, w2, opStr) => {
    setMode("online"); setOpName(opStr);
    setPBlocks(10); setEBlocks(10); pbR.current=10; ebR.current=10;
    setProjs([]); setExplosions([]); setWinner(null); winRef.current=null; setPInput("");
    setPWord(w1); setEWord(w2);
    setPhase("playing");
  }, []);

  const handleMsg=useCallback((data,isHost)=>{
    if(data._s===myIdRef.current)return;
    if(data.type==='join'&&isHost&&!hostInitSentRef.current){
      hostInitSentRef.current=true;
      const w1=getWord(Math.random()<0.3),w2=getWord(Math.random()<0.3);
      const body=JSON.stringify({type:'init',w1,w2,_s:myIdRef.current});
      fetch(RELAY+'/'+topicRef.current,{method:'POST',body,cache:'no-store'}).catch(()=>{});
      setTimeout(()=>fetch(RELAY+'/'+topicRef.current,{method:'POST',body,cache:'no-store'}).catch(()=>{}),300);
      startOnlineGame(true,w1,w2,"상대방");
    }
    else if(data.type==='init'&&!isHost&&!initRecvRef.current){
      initRecvRef.current=true;
      startOnlineGame(false,data.w2,data.w1,"방장");
    }
    else if(data.type==='shot'){
      setProjs(prev=>[...prev,{id:Date.now()+Math.random(),fromPlayer:false,power:data.power,startTime:Date.now(),duration:2500,word:data.word}]);
    }
    else if(data.type==='syncBlk'){
      setEBlocks(data.blocks);ebR.current=data.blocks;
    }
    else if(data.type==='syncWord'){
      setEWord(data.word);
    }
    else if(data.type==='win'){
      setWinner("enemy");winRef.current="enemy";setPhase("over");cleanup();
      if(userId)updateBattleRank(userId,lang,false);
    }
    else if(data.type==='leave'){
      alert("상대방이 나갔습니다.");cleanup();setPhase("select");
    }
  },[getWord,startOnlineGame,lang,userId,cleanup]);

  const connectRelay = useCallback((code, isHost) => {
    const topic='jbu-battle-'+code;
    topicRef.current=topic;
    initRecvRef.current=false;
    hostInitSentRef.current=false;
    lastIdRef.current='';
    aliveRef.current=true;

    setConnStatus(isHost?'✅ 상대방 대기 중...':'✅ 참가 요청 중...');

    // Joiner sends join messages every 2.5s
    if(!isHost){
      const sendJoin=()=>{
        if(!aliveRef.current||initRecvRef.current)return;
        fetch(RELAY+'/'+topic,{method:'POST',body:JSON.stringify({type:'join',_s:myIdRef.current}),cache:'no-store'}).catch(()=>{});
      };
      setTimeout(sendJoin,500);
      const jt=setInterval(()=>{if(aliveRef.current&&!initRecvRef.current)sendJoin();else clearInterval(jt)},2500);
    }

    // Polling with 429 backoff
    let backoff=0;
    const doPoll=async()=>{
      if(!aliveRef.current)return;
      if(backoff>0){backoff--;return}
      try{
        const since=lastIdRef.current?lastIdRef.current:'10s';
        const url=RELAY+'/'+topic+'/json?poll=1&since='+since;
        const res=await fetch(url,{cache:'no-store'});
        if(res.status===429){backoff=4;return}
        if(!res.ok)return;
        const text=await res.text();
        if(!text.trim())return;
        const lines=text.trim().split('\n');
        for(const line of lines){
          try{
            const ev=JSON.parse(line);
            if(ev.id)lastIdRef.current=ev.id;
            if(ev.event!=='message')continue;
            const data=JSON.parse(ev.message);
            handleMsg(data,isHost);
          }catch(pe){}
        }
      }catch(fe){}
    };
    setTimeout(()=>{if(aliveRef.current)pollRef.current=setInterval(doPoll,800)},isHost?100:1200);

  },[handleMsg]);

  const hostGame = () => {
    const code=Math.floor(1000+Math.random()*9000).toString();
    setRoomCode(code);setPhase("waiting");
    connectRelay(code,true);
  };

  const joinGame = () => {
    if(!joinCode.trim())return;
    setRoomCode('');setPhase("waiting");
    connectRelay(joinCode.trim(),false);
  };

  // ── GAME LOOP ──
  const gameLoop=useCallback(()=>{
    const now=Date.now();
    setProjs(prev=>{
      const toRm=new Set();
      const upd=prev.map(p=>({...p,progress:Math.min(1,(now-p.startTime)/p.duration)}));
      for(let i=0;i<upd.length;i++){if(toRm.has(i))continue;
        for(let j=i+1;j<upd.length;j++){if(toRm.has(j))continue;
          const a=upd[i],b=upd[j];if(a.fromPlayer===b.fromPlayer)continue;
          const ax=a.fromPlayer?50+a.progress*700:750-a.progress*700;
          const bx=b.fromPlayer?50+b.progress*700:750-b.progress*700;
          const ay=300+150*Math.sin(Math.PI*a.progress);
          const by=300+150*Math.sin(Math.PI*b.progress);
          if(Math.sqrt((ax-bx)**2+(ay-by)**2)<35){
            setExplosions(ex=>[...ex,{id:Math.random(),x:(ax+bx)/2,y:(ay+by)/2,t:now}]);
            if(a.power>1&&b.power<=1){a.power--;toRm.add(j)}
            else if(b.power>1&&a.power<=1){b.power--;toRm.add(i)}
            else{toRm.add(i);toRm.add(j)}
          }
        }
      }
      let dmgToE=0,dmgToP=0;
      for(let i=0;i<upd.length;i++){if(toRm.has(i))continue;
        if(upd[i].progress>=1){toRm.add(i);const p=upd[i];
          if(p.fromPlayer)dmgToE+=p.power;else dmgToP+=p.power;
          setExplosions(ex=>[...ex,{id:Math.random(),x:p.fromPlayer?740:60,y:300,t:now}]);
        }
      }
      if(dmgToE>0){
        setEBlocks(b=>{const n=Math.max(0,b-dmgToE);ebR.current=n;return n});
      }
      if(dmgToP>0){
        setPBlocks(b=>{
           const n=Math.max(0,b-dmgToP);pbR.current=n;
           if(mode==="online") {
             relaySend({type:'syncBlk', blocks: n});
             if(n<=0) relaySend({type:'win'});
           }
           return n;
        });
      }
      return upd.filter((_,i)=>!toRm.has(i));
    });
    setExplosions(ex=>ex.filter(e=>now-e.t<500));
    
    if(ebR.current<=0&&!winRef.current){
      setWinner("player");winRef.current="player";setPhase("over");cleanup();
      if(userId)updateBattleRank(userId,lang,true);
    }
    if(pbR.current<=0&&!winRef.current){
      setWinner("enemy");winRef.current="enemy";setPhase("over");cleanup();
      if(userId&&mode==="ai")updateBattleRank(userId,lang,false); // online loss is handled via 'win' event
    }
    if(phase==="playing")fR.current=requestAnimationFrame(gameLoop);
  },[phase,userId,lang,mode,cleanup,relaySend]);

  useEffect(()=>{if(phase==="playing"){fR.current=requestAnimationFrame(gameLoop);return()=>{cancelAnimationFrame(fR.current);clearTimeout(aiTR.current)}}},[phase,gameLoop]);
  useEffect(()=>{if(phase==="playing"&&iR.current)iR.current.focus()},[phase]);

  const submit=useCallback(()=>{
    const t=pInput.trim();if(!t||t!==pWord)return setPInput("");
    const pw = isSpecWord(pWord,lang)?2:1;
    fireProj(true,pWord, pw);
    if(mode==="online") relaySend({type:'shot', word: pWord, power: pw});
    
    const nw=getWord(Math.random()<0.3);setPWord(nw);
    if(mode==="online") relaySend({type:'syncWord', word: nw});
    setPInput("");
  },[pInput,pWord,fireProj,getWord,mode,lang,relaySend]);

  const hKD=useCallback(e=>{
    if(e.key==="Escape"){if(mode==="online")relaySend({type:'leave'});cleanup();onMenu();return}
    if(e.key===" "||e.key==="Enter"){e.preventDefault();submit()}
  },[submit,onMenu,cleanup,mode,relaySend]);

async function updateBattleRank(userId,lang,isWin){
  if(!userId)return;
  // Local storage ranking only
  const lk="lb:"+lang+":battle";
  const lb=await DB.get(lk,true)||[];
  const ei=lb.findIndex(r=>r.user===userId);
  if(ei>=0){lb[ei].score+=(isWin?10:-5);lb[ei].wins+=(isWin?1:0);lb[ei].losses+=(isWin?0:1);lb[ei].date=Date.now()}
  else lb.push({user:userId,score:isWin?10:-5,wins:isWin?1:0,losses:isWin?0:1,date:Date.now()});
  lb.sort((a,b)=>b.score-a.score);
  await DB.set(lk,lb.slice(0,10),true);

  // Personal stats
  const stats=await DB.get("stats:"+userId)||{};
  if(!stats.battle)stats.battle={wins:0,losses:0,score:0};
  stats.battle.wins+=(isWin?1:0);stats.battle.losses+=(isWin?0:1);stats.battle.score+=(isWin?10:-5);
  await DB.set("stats:"+userId,stats);
}
